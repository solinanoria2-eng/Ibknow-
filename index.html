<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b1a">
<title>Ibknow AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0b1a;
    font-family: Georgia, serif;
    color: #f1f0ff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #glow {
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,11,26,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
    flex-shrink: 0;
  }
  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(124,58,237,0.5);
  }
  .logo-name { font-size: 17px; font-weight: bold; letter-spacing: 0.3px; }
  .logo-status { font-size: 12px; color: #7c6fcd; }
  #clearBtn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #a78bfa;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    display: none;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 2px; }
  .welcome { text-align: center; padding-top: 50px; }
  .welcome .star { font-size: 48px; margin-bottom: 16px; }
  .welcome h1 { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
  .welcome p { color: #7c6fcd; font-size: 14px; margin-bottom: 32px; }
  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 420px;
    margin: 0 auto;
  }
  .sug-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #c4b5fd;
    padding: 11px 13px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
    line-height: 1.4;
    font-family: Georgia, serif;
    transition: all 0.2s;
  }
  .sug-btn:active { background: rgba(124,58,237,0.2); }
  .msg-row {
    display: flex;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { justify-content: flex-start; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .avatar.bot {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    margin-right: 9px;
    box-shadow: 0 0 10px #7c3aed44;
  }
  .avatar.user {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    margin-left: 9px;
  }
  .bubble {
    max-width: 72%;
    padding: 11px 14px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.bot {
    border-radius: 16px 16px 16px 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .bubble.user {
    border-radius: 16px 16px 4px 16px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    box-shadow: 0 4px 18px rgba(124,58,237,0.35);
  }
  .bubble img {
    max-width: 100%;
    border-radius: 10px;
    margin-bottom: 6px;
    display: block;
  }
  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #a78bfa;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .error-msg {
    color: #f87171;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    margin: 6px 0;
  }
  footer {
    padding: 12px 14px;
    border-top: 1px solid rgba(255,255,255,0.07);
    background: rgba(13,11,26,0.97);
    flex-shrink: 0;
    z-index: 10;
  }
  #imgPreviewWrap {
    display: none;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    padding: 8px 10px;
  }
  #imgPreview {
    width: 48px; height: 48px;
    object-fit: cover;
    border-radius: 8px;
  }
  #imgPreviewName {
    flex: 1;
    font-size: 12px;
    color: #a78bfa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #removeImg {
    background: none;
    border: none;
    color: #f87171;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
  }
  .input-wrap {
    display: flex;
    gap: 9px;
    align-items: flex-end;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 16px;
    padding: 7px 7px 7px 14px;
    box-shadow: 0 0 18px rgba(124,58,237,0.1);
  }
  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #f1f0ff;
    font-size: 14px;
    resize: none;
    font-family: Georgia, serif;
    line-height: 1.6;
    max-height: 110px;
    overflow-y: auto;
    padding: 3px 0;
  }
  #input::placeholder { color: #4b3f7a; }
  .action-btns { display: flex; gap: 6px; align-items: center; }
  #imgBtn {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #sendBtn {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 14px rgba(124,58,237,0.5);
    transition: opacity 0.2s;
  }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
  .footer-note { text-align: center; color: #4b3f7a; font-size: 11px; margin-top: 7px; }
  #fileInput { display: none; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="glow"></div>
<header>
  <div class="logo-wrap">
    <div class="logo-icon">&#10022;</div>
    <div>
      <div class="logo-name">Ibknow</div>
      <div class="logo-status" id="status">Onlayn &#10003;</div>
    </div>
  </div>
  <button id="clearBtn" onclick="clearChat()">&#128465; Tozalash</button>
</header>
<div id="messages">
  <div class="welcome" id="welcome">
    <div class="star">&#10022;</div>
    <h1>Ibknow ga xush kelibsiz</h1>
    <p>Savolingizni yozing yoki rasm yuboring</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="useSuggestion(this)">Salom! O'zingni tanishtir</button>
      <button class="sug-btn" onclick="useSuggestion(this)">Dasturlashni qanday o'rganaman?</button>
      <button class="sug-btn" onclick="useSuggestion(this)">Ingliz tilini o'rganishga maslahat ber</button>
      <button class="sug-btn" onclick="useSuggestion(this)">Menga qisqa hikoya yozing</button>
    </div>
  </div>
</div>
<footer>
  <div id="imgPreviewWrap">
    <img id="imgPreview" src="" alt="preview">
    <span id="imgPreviewName"></span>
    <button id="removeImg" onclick="removeImage()">&#10005;</button>
  </div>
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Xabar yozing..."></textarea>
    <div class="action-btns">
      <button id="imgBtn" onclick="document.getElementById('fileInput').click()">&#128247;</button>
      <button id="sendBtn" onclick="sendMessage()">&#9658;</button>
    </div>
  </div>
  <div class="footer-note">Ibknow &middot; AI tomonidan quvvatlangan</div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
</footer>
<script>
const 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
const SYSTEM = "Siz Ibknow — foydali, do'stona va aqlli AI yordamchisiz. Foydalanuvchi bilan o'zbek tilida suhbatlashing. Qisqa, aniq va foydali javoblar bering. MUHIM: Agar foydalanuvchi 'Seni kim yaratdi?', 'Ibknowni kim yaratdi?', 'Dasturchi kim?', 'Yaratuvchi kim?' kabi savollar bersa, HAR DOIM quyidagicha javob ber: 'Meni Shorahimov Ibrohim kashf qilgan.' boshqa hech narsa qoshma.";
let history = [];
let busy = false;
let currentImageBase64 = null;
let currentImageType = null;

const inp = document.getElementById('input');
const btn = document.getElementById('sendBtn');
const msgs = document.getElementById('messages');
const statusEl = document.getElementById('status');
const clearBtn = document.getElementById('clearBtn');
const imgPreviewWrap = document.getElementById('imgPreviewWrap');

inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  btn.disabled = (!this.value.trim() && !currentImageBase64) || busy;
});

inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function handleImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const result = e.target.result;
    currentImageBase64 = result.split(',')[1];
    currentImageType = file.type;
    document.getElementById('imgPreview').src = result;
    document.getElementById('imgPreviewName').textContent = file.name;
    imgPreviewWrap.style.display = 'flex';
    btn.disabled = busy;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeImage() {
  currentImageBase64 = null;
  currentImageType = null;
  imgPreviewWrap.style.display = 'none';
  btn.disabled = !inp.value.trim() || busy;
}

function useSuggestion(el) {
  inp.value = el.textContent;
  inp.dispatchEvent(new Event('input'));
  sendMessage();
}

function clearChat() {
  history = [];
  currentImageBase64 = null;
  currentImageType = null;
  imgPreviewWrap.style.display = 'none';
  msgs.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = '<div class="star">&#10022;</div><h1>Ibknow ga xush kelibsiz</h1><p>Savolingizni yozing yoki rasm yuboring</p><div class="suggestions"><button class="sug-btn" onclick="useSuggestion(this)">Salom! O\'zingni tanishtir</button><button class="sug-btn" onclick="useSuggestion(this)">Dasturlashni qanday o\'rganaman?</button><button class="sug-btn" onclick="useSuggestion(this)">Ingliz tilini o\'rganishga maslahat ber</button><button class="sug-btn" onclick="useSuggestion(this)">Menga qisqa hikoya yozing</button></div>';
  msgs.appendChild(w);
  clearBtn.style.display = 'none';
}

function addMsg(role, text, imgSrc) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  clearBtn.style.display = 'block';
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');
  if (role === 'assistant') {
    row.innerHTML = '<div class="avatar bot">&#10022;</div><div class="bubble bot">' + text + '</div>';
  } else {
    let content = '';
    if (imgSrc) content += '<img src="' + imgSrc + '" alt="rasm">';
    if (text) content += text;
    row.innerHTML = '<div class="bubble user">' + content + '</div><div class="avatar user">&#128100;</div>';
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing';
  row.innerHTML = '<div class="avatar bot">&#10022;</div><div class="bubble bot"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inp.value.trim();
  if ((!text && !currentImageBase64) || busy) return;
  busy = true;
  btn.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';
  statusEl.textContent = 'Yozmoqda...';

  const imgSrcPreview = currentImageBase64 ? 'data:' + currentImageType + ';base64,' + currentImageBase64 : null;

  let userContent = text || 'Bu rasmni tahlil qil';
  history.push({ role: 'user', content: userContent });
  addMsg('user', text, imgSrcPreview);

  currentImageBase64 = null;
  currentImageType = null;
  imgPreviewWrap.style.display = 'none';
  showTyping();

  try {
    const messages = [{ role: 'system', content: SYSTEM }, ...history];
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_API_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: messages,
        max_tokens: 1000
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Xatolik yuz berdi.';
    removeTyping();
    history.push({ role: 'assistant', content: reply });
    addMsg('assistant', reply);
  } catch(e) {
    removeTyping();
    const err = document.createElement('div');
    err.className = 'error-msg';
    err.textContent = 'Tarmoq xatosi. Qayta urinib ko\'ring.';
    msgs.appendChild(err);
    msgs.scrollTop = msgs.scrollHeight;
    history.pop();
  }

  busy = false;
  btn.disabled = false;
  statusEl.textContent = 'Onlayn &#10003;';
  inp.focus();
}
</script>
</body>
</html>
